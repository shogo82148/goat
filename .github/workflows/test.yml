name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go:
          - "stable"
          - "1.26"
        os:
          - ubuntu-latest
        goarch:
          - amd64
        include:
          # test on 32-bit platforms
          - go: "stable"
            os: ubuntu-latest
            goarch: "386"

          # test on windows
          - go: "stable"
            os: windows-latest
            goarch: "amd64"
          # test on macos
          - go: "stable"
            os: macos-latest
            goarch: "arm64"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}

      - name: test
        run: |
          go test -v -coverprofile="profile.cov" ./...
        env:
          GOARCH: ${{ matrix.goarch }}

      - uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
        with:
          path-to-profile: profile.cov
          flag-name: Go-${{ matrix.go }}-${{ matrix.os }}-${{ matrix.goarch }}
          parallel: true

  # notifies that all test jobs are finished.
  finish:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
        with:
          parallel-finished: true
